<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電子印鑑作成 | OSAKA TEC</title>
<style>
:root{
  --brand:#00AEEF;
  --brand-dark:#0089BC;
  --brand-pale:#E6F7FE;
  --ink:#1E2A32;
  --muted:#6B7C88;
  --line:#DDE5EA;
  --bg:#F2F6F9;
  --card:#FFFFFF;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
header{
  background:var(--card);
  border-bottom:3px solid var(--brand);
  padding:14px 24px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
header .logo{height:38px;width:auto;display:block;}
header .divider{width:1px;height:30px;background:var(--line);}
header .titles h1{font-size:17px;margin:0;letter-spacing:.04em;}
header .titles p{font-size:11px;margin:2px 0 0;color:var(--muted);letter-spacing:.08em;}
header .titles h1 .ver{
  display:inline-block;vertical-align:middle;
  font-size:11px;font-weight:bold;letter-spacing:.06em;
  color:var(--brand-dark);background:var(--brand-pale);
  border:1px solid var(--brand);border-radius:11px;
  padding:2px 9px;margin-left:8px;position:relative;top:-1px;
}
header .ver-meta{
  margin-left:auto;text-align:right;font-size:10.5px;
  color:var(--muted);letter-spacing:.05em;line-height:1.6;
}
.wrap{max-width:1000px;margin:0 auto;padding:24px;}
.layout{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;}
.panel{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:0;flex:1 1 400px;overflow:hidden;
  box-shadow:0 1px 3px rgba(30,42,50,.06);
}
.panel-head{
  background:var(--brand-pale);
  border-bottom:1px solid var(--line);
  padding:10px 16px;font-size:12.5px;font-weight:bold;
  color:var(--brand-dark);letter-spacing:.06em;
  display:flex;align-items:center;gap:8px;
}
.panel-head::before{
  content:"";width:4px;height:14px;background:var(--brand);border-radius:2px;
}
.panel-body{padding:16px;}
.preview-body{
  padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:14px;
}
label{display:block;font-size:12.5px;margin:14px 0 5px;font-weight:bold;color:var(--ink);}
.panel-body > *:first-child, .panel-body > div:first-child > label:first-child{margin-top:0;}
input[type="text"],select{
  width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;
  font-size:14px;background:#fff;color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
input[type="text"]:focus,select:focus{
  outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,174,239,.15);
}
input[type="range"]{
  width:100%;-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;
  background:var(--line);outline:none;margin:6px 0 2px;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:var(--brand);cursor:pointer;border:2px solid #fff;
  box-shadow:0 1px 3px rgba(0,0,0,.25);
}
input[type="range"]::-moz-range-thumb{
  width:17px;height:17px;border-radius:50%;background:var(--brand);
  cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25);
}
.check{
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:normal;
  margin:10px 0;cursor:pointer;
}
.check input{width:16px;height:16px;accent-color:var(--brand);cursor:pointer;margin:0;}
.row{display:flex;gap:10px;}
.row > div{flex:1;}
canvas{
  background:
    linear-gradient(45deg,#f0f4f7 25%,transparent 25%,transparent 75%,#f0f4f7 75%),
    linear-gradient(45deg,#f0f4f7 25%,transparent 25%,transparent 75%,#f0f4f7 75%);
  background-size:16px 16px;background-position:0 0,8px 8px;
  border:1px solid var(--line);border-radius:6px;max-width:100%;
}
button{
  padding:10px 16px;border:none;border-radius:6px;
  background:var(--brand);color:#fff;font-size:13.5px;font-weight:bold;
  cursor:pointer;letter-spacing:.04em;transition:background .15s,transform .05s;
}
button:hover{background:var(--brand-dark);}
button:active{transform:translateY(1px);}
button.sub{background:#fff;color:var(--brand-dark);border:1px solid var(--brand);}
button.sub:hover{background:var(--brand-pale);}
.btns{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.btns button{flex:1 1 auto;}
.val{font-size:11.5px;color:var(--brand-dark);float:right;font-weight:bold;}
.divider-h{height:1px;background:var(--line);margin:18px 0;}
.sec-label{
  font-size:11px;color:var(--muted);letter-spacing:.1em;font-weight:bold;
  margin:0 0 2px;text-transform:uppercase;
}
.info{font-size:11.5px;color:var(--muted);letter-spacing:.05em;}
.toast{
  position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:11px 22px;border-radius:24px;
  font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
footer{
  text-align:center;padding:20px;font-size:11px;color:var(--muted);letter-spacing:.06em;
}
@media(max-width:640px){
  header{padding:12px 16px;gap:12px;}
  header .logo{height:30px;}
  .wrap{padding:16px;}
}
</style>
</head>
<body>
<header>
  <img class="logo" id="brandLogo" alt="OSAKA TEC">
  <div class="divider"></div>
  <div class="titles">
    <h1>電子印鑑作成 <span class="ver" id="verBadge"></span></h1>
    <p>DIGITAL STAMP GENERATOR</p>
  </div>
  <div class="ver-meta">
    <span id="verUpdated"></span>
  </div>
</header>

<div class="wrap">
  <div class="layout">

    <div class="panel">
      <div class="panel-head">設定</div>
      <div class="panel-body">

        <p class="sec-label">STAMP TYPE</p>
        <select id="type">
          <option value="round">丸印（縦書き）</option>
          <option value="round_h">丸印（横書き）</option>
          <option value="date">日付印（三段）</option>
          <option value="receipt">受領印（三段）</option>
        </select>

        <div id="textField">
          <label>文字</label>
          <select id="textPreset">
            <option value="納">納</option>
            <option value="納　絵理">納　絵理</option>
            <option value="__custom__">自由入力</option>
          </select>
          <input type="text" id="text" value="納" maxlength="12" style="margin-top:6px;display:none">
        </div>

        <div id="dateFields" style="display:none">
          <label>上段</label>
          <input type="text" id="topText" value="大阪テック" maxlength="8">
          <label>中段（日付）</label>
          <input type="text" id="dateText" value="">
          <label>下段</label>
          <select id="btmPreset">
            <option value="納">納</option>
            <option value="納　絵理">納　絵理</option>
            <option value="__custom__">自由入力</option>
          </select>
          <input type="text" id="btmText" value="納" maxlength="8" style="margin-top:6px;display:none">
        </div>

        <div id="receiptFields" style="display:none">
          <label>上段</label>
          <input type="text" id="rTop" value="受領" maxlength="8">
          <label>中段</label>
          <select id="rMidPreset">
            <option value="納">納</option>
            <option value="納　絵理">納　絵理</option>
            <option value="__custom__">自由入力</option>
          </select>
          <input type="text" id="rMid" value="納" maxlength="8" style="margin-top:6px;display:none">
          <label>下段（日付）</label>
          <input type="text" id="rBtm" value="">
        </div>

        <div class="divider-h"></div>
        <p class="sec-label">APPEARANCE</p>

        <label>フォント</label>
        <select id="font">
          <option value="serif">明朝体</option>
          <option value="sans-serif">ゴシック体</option>
          <option value='"Yu Mincho","MS Mincho",serif'>游明朝</option>
        </select>

        <label>色</label>
        <div class="row">
          <div><input type="color" id="color" value="#c0392b" style="width:100%;height:36px;border:1px solid var(--line);border-radius:6px;padding:2px;cursor:pointer;background:#fff"></div>
          <div><select id="preset">
            <option value="#c0392b">朱色</option>
            <option value="#e60012">赤</option>
            <option value="#1a3c8c">紺</option>
            <option value="#00AEEF">コーポレートカラー</option>
            <option value="#000000">黒</option>
          </select></div>
        </div>

        <label>サイズ <span class="val" id="sizeVal">300 px</span></label>
        <input type="range" id="size" min="120" max="600" step="10" value="300">

        <label>枠線の太さ <span class="val" id="borderVal">10</span></label>
        <input type="range" id="border" min="2" max="30" value="10">

        <label>文字サイズ調整 <span class="val" id="fsVal">100 %</span></label>
        <input type="range" id="fontScale" min="50" max="150" value="100">

        <label>文字間隔 <span class="val" id="lsVal">0</span></label>
        <input type="range" id="letterSpace" min="-20" max="40" value="0">

        <div class="divider-h"></div>
        <label class="check"><input type="checkbox" id="transparent" checked> 背景を透過（PNG）</label>
        <label class="check"><input type="checkbox" id="aged"> かすれ加工</label>

      </div>
    </div>

    <div class="panel">
      <div class="panel-head">プレビュー</div>
      <div class="preview-body">
        <canvas id="cv" width="300" height="300"></canvas>
        <div class="info" id="info"></div>
        <div class="btns" style="width:100%">
          <button onclick="download('png')">PNG保存</button>
          <button class="sub" onclick="download('jpeg')">JPEG保存</button>
          <button class="sub" onclick="copyImg()">コピー</button>
        </div>
      </div>
    </div>

  </div>
</div>

<footer>OSAKA TEC CO., LTD.　生産管理　/　<span id="verFooter"></span></footer>
<div class="toast" id="toast"></div>

function today(){
  const d = new Date();
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}
$('dateText').value = today();
$('rBtm').value = today();

const ids = ['type','text','topText','btmText','dateText','rTop','rMid','rBtm',
             'font','color','size','border','fontScale','letterSpace','transparent','aged'];
ids.forEach(id => {
  $(id).addEventListener('input', draw);
  $(id).addEventListener('change', draw);
});

$('preset').addEventListener('change', e => { $('color').value = e.target.value; draw(); });

function bindPreset(selectId, inputId){
  $(selectId).addEventListener('change', e => {
    if (e.target.value === '__custom__') {
      $(inputId).style.display = 'block';
      $(inputId).focus();
    } else {
      $(inputId).style.display = 'none';
      $(inputId).value = e.target.value;
    }
    draw();
  });
}
bindPreset('textPreset', 'text');
bindPreset('btmPreset', 'btmText');
bindPreset('rMidPreset', 'rMid');

$('type').addEventListener('change', () => {
  const t = $('type').value;
  $('textField').style.display = (t === 'round' || t === 'round_h') ? 'block' : 'none';
  $('dateFields').style.display = (t === 'date') ? 'block' : 'none';
  $('receiptFields').style.display = (t === 'receipt') ? 'block' : 'none';
  draw();
});

function draw(){
  const type = $('type').value;
  const size = +$('size').value;
  const bw = +$('border').value * size / 300;
  const color = $('color').value;
  const font = $('font').value;
  const fs = +$('fontScale').value / 100;
  const ls = +$('letterSpace').value * size / 300;

  $('sizeVal').textContent = size + ' px';
  $('borderVal').textContent = $('border').value;
  $('fsVal').textContent = $('fontScale').value + ' %';
  $('lsVal').textContent = $('letterSpace').value;

  cv.width = cv.height = size;
  ctx.clearRect(0,0,size,size);

  if (!$('transparent').checked) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,size,size);
  }

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = bw;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const c = size / 2;
  const r = c - bw/2 - size*0.02;
  ctx.beginPath(); ctx.arc(c, c, r, 0, Math.PI*2); ctx.stroke();

  if (type === 'round') {
    drawVertical($('text').value, c, size, r, font, fs, ls);
  } else if (type === 'round_h') {
    drawHorizontal($('text').value, c, size, r, font, fs, ls);
  } else if (type === 'date') {
    drawThreeRow([$('topText').value, $('dateText').value, $('btmText').value],
                 c, r, bw, font, fs, [0.26, 0.30, 0.28]);
  } else if (type === 'receipt') {
    drawThreeRow([$('rTop').value, $('rMid').value, $('rBtm').value],
                 c, r, bw, font, fs, [0.28, 0.34, 0.24]);
  }

  if ($('aged').checked) applyAged(size);
  $('info').textContent = size + ' × ' + size + ' px  /  ' +
    ($('transparent').checked ? '背景透過' : '白背景');
}

function fitFont(text, maxW, base, font){
  let s = base;
  ctx.font = 'bold ' + s + 'px ' + font;
  while (ctx.measureText(text).width > maxW && s > 6) {
    s -= 1;
    ctx.font = 'bold ' + s + 'px ' + font;
  }
  return s;
}

function drawThreeRow(texts, c, r, bw, font, fs, ratios){
  const lw = bw * 0.6;
  ctx.lineWidth = lw;
  const y1 = c - r * 0.32, y2 = c + r * 0.32;
  [y1, y2].forEach(y => {
    const half = Math.sqrt(Math.max(r*r - (y-c)*(y-c), 0));
    ctx.beginPath();
    ctx.moveTo(c - half, y); ctx.lineTo(c + half, y); ctx.stroke();
  });

  const rows = [
    [texts[0], c - r*0.6, r*1.2,  ratios[0]],
    [texts[1], c,         r*1.55, ratios[1]],
    [texts[2], c + r*0.6, r*1.2,  ratios[2]]
  ];
  rows.forEach(item => {
    const t = item[0], y = item[1], maxW = item[2], ratio = item[3];
    if (!t) return;
    const s = fitFont(t, maxW, r * ratio * fs, font);
    ctx.font = 'bold ' + s + 'px ' + font;
    ctx.fillText(t, c, y);
  });
  ctx.lineWidth = bw;
}

function drawVertical(text, c, size, r, font, fs, ls){
  const chars = [...text].filter(ch => ch.trim());
  if (!chars.length) return;
  const n = chars.length;
  const area = r * 1.35;

  if (n <= 4) {
    const fsz = Math.min(area / n, area * 0.55) * fs;
    ctx.font = 'bold ' + fsz + 'px ' + font;
    const step = fsz + ls;
    const total = step * n - ls;
    let y = c - total/2 + step/2;
    chars.forEach(ch => { ctx.fillText(ch, c, y); y += step; });
  } else {
    const colN = Math.ceil(n/2);
    const right = chars.slice(0, colN);
    const left = chars.slice(colN);
    const fsz = Math.min(area / colN, area * 0.42) * fs;
    ctx.font = 'bold ' + fsz + 'px ' + font;
    const colX = fsz * 0.62;
    [[right, c + colX], [left, c - colX]].forEach(pair => {
      const col = pair[0], x = pair[1];
      const step = fsz + ls;
      const total = step * col.length - ls;
      let y = c - total/2 + step/2;
      col.forEach(ch => { ctx.fillText(ch, x, y); y += step; });
    });
  }
}

function drawHorizontal(text, c, size, r, font, fs, ls){
  const chars = [...text].filter(ch => ch.trim());
  if (!chars.length) return;
  const maxW = r * 1.4;
  const lines = chars.length <= 3 ? [chars]
    : [chars.slice(0, Math.ceil(chars.length/2)), chars.slice(Math.ceil(chars.length/2))];
  const base = maxW / Math.max(...lines.map(l => l.length)) * fs;
  const fsz = Math.min(base, r * 0.8);
  ctx.font = 'bold ' + fsz + 'px ' + font;
  const lh = fsz * 1.1;
  let y = c - (lines.length-1)*lh/2;
  lines.forEach(line => {
    drawSpaced(line.join(''), c, y, ls);
    y += lh;
  });
}

function drawSpaced(text, cx, y, ls){
  if (!ls) { ctx.fillText(text, cx, y); return; }
  const chars = [...text];
  const widths = chars.map(ch => ctx.measureText(ch).width);
  const total = widths.reduce((a,b)=>a+b,0) + ls*(chars.length-1);
  let x = cx - total/2;
  chars.forEach((ch,i) => {
    ctx.fillText(ch, x + widths[i]/2, y);
    x += widths[i] + ls;
  });
}

function applyAged(size){
  const img = ctx.getImageData(0,0,size,size);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] > 0) {
      const n = Math.random();
      if (n < 0.14) d[i+3] = 0;
      else if (n < 0.35) d[i+3] *= 0.55;
    }
  }
  ctx.putImageData(img, 0, 0);
}

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 2000);
}

function download(fmt){
  const t = $('type').value;
  let name = 'stamp';
  if (t === 'round' || t === 'round_h') name = $('text').value || 'stamp';
  else if (t === 'date') name = $('dateText').value || 'date';
  else if (t === 'receipt') name = $('rTop').value || 'receipt';
  name = name.replace(/[\\/:*?"<>|\s]/g, '_');

  let src = cv;
  if (fmt === 'jpeg') {
    const tc = document.createElement('canvas');
    tc.width = cv.width; tc.height = cv.height;
    const g = tc.getContext('2d');
    g.fillStyle = '#fff'; g.fillRect(0,0,tc.width,tc.height);
    g.drawImage(cv,0,0);
    src = tc;
  }
  const a = document.createElement('a');
  a.download = 'inkan_' + name + '.' + (fmt === 'jpeg' ? 'jpg' : 'png');
  a.href = src.toDataURL(fmt === 'jpeg' ? 'image/jpeg' : 'image/png', 0.95);
  a.click();
  toast('保存しました');
}

async function copyImg(){
  try {
    const blob = await new Promise(res => cv.toBlob(res, 'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    toast('クリップボードにコピーしました');
  } catch(e) {
    toast('このブラウザでは非対応です。PNG保存をご利用ください');
  }
}

draw();
</script>
